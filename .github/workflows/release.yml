name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.1). Leave empty to use the latest commit SHA."
        required: false
        default: ""
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.88.0"
  TARGET: x86_64-pc-windows-gnu

jobs:
  build:
    name: Build Release Binaries
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ env.TARGET }}

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release

      - name: Build all release binaries
        run: |
          cargo build --target ${{ env.TARGET }} --release --locked --verbose `
            -p cli-legacy `
            -p mod-manager-cli `
            -p dinput8-proxy `
            -p dbghelp-proxy

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrEmpty($tag)) {
            if ("${{ github.ref_type }}" -eq "tag") {
              $tag = "${{ github.ref_name }}"
            } else {
              $tag = "dev-${{ github.sha }}".Substring(0, 11)
            }
          }
          "version=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $tag"

      - name: Stage release files
        shell: pwsh
        run: |
          $stage = "release-staging"
          New-Item -ItemType Directory -Path $stage | Out-Null
          $bin = "target/${{ env.TARGET }}/release"
          Copy-Item "$bin/kfc-parser.exe" -Destination $stage
          Copy-Item "$bin/emm.exe"        -Destination $stage
          Copy-Item "$bin/dinput8.dll"    -Destination $stage
          Copy-Item "$bin/dbghelp.dll"    -Destination $stage
          Copy-Item "LICENSE"             -Destination $stage
          Copy-Item "README.md"           -Destination $stage
          Get-ChildItem $stage

      - name: Create zip archive
        shell: pwsh
        run: |
          $name = "kfc-parser-${{ steps.version.outputs.version }}-windows-x86_64.zip"
          Compress-Archive -Path "release-staging/*" -DestinationPath $name -Force
          "ARCHIVE_NAME=$name" | Out-File -FilePath $env:GITHUB_ENV -Append
          Get-FileHash $name -Algorithm SHA256 | Tee-Object -FilePath "$name.sha256.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kfc-parser-${{ steps.version.outputs.version }}-windows-x86_64
          path: |
            ${{ env.ARCHIVE_NAME }}
            ${{ env.ARCHIVE_NAME }}.sha256.txt
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ env.ARCHIVE_NAME }}
            ${{ env.ARCHIVE_NAME }}.sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
